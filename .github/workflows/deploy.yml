name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install && yarn build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
